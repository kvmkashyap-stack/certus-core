<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Certus Core Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0A0A0A; color: #E5E5E5; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(10px); }
        .thinking-box { border-left: 2px solid #3b82f6; background: #111; padding: 10px; margin-bottom: 15px; font-style: italic; color: #999; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">
    <div class="w-64 border-r border-gray-900 p-6 flex flex-col gap-6 glass">
        <div class="text-xl font-bold tracking-tighter text-blue-500">CERTUS CORE</div>
        <button onclick="location.reload()" class="w-full py-2 bg-zinc-900 rounded-lg border border-gray-800 text-sm hover:bg-zinc-800 transition">+ New Research</button>
        <div class="mt-4 text-xs text-gray-500 uppercase tracking-widest">Library</div>
        <div id="archive-list" class="space-y-2 text-sm text-gray-400">
            <div class="cursor-pointer hover:text-white"><i class="fas fa-archive mr-2"></i> Recent Archive</div>
        </div>
        <div class="mt-auto">
            <input type="file" id="fileUp" class="hidden" onchange="upload()">
            <button onclick="document.getElementById('fileUp').click()" class="text-gray-500 hover:text-white text-sm w-full text-left py-2 border-t border-gray-900"><i class="fas fa-cloud-upload-alt mr-2"></i> Sync Document</button>
        </div>
    </div>

    <div class="flex-1 flex flex-col items-center overflow-y-auto p-6 scroll-smooth">
        <div id="feed" class="w-full max-w-3xl space-y-12 mt-10 pb-40">
            <h1 class="text-5xl font-serif text-center mt-20 text-gray-700">What are we researching?</h1>
        </div>

        <div class="fixed bottom-8 w-full max-w-3xl glass border border-gray-800 rounded-3xl p-4 shadow-2xl">
            <div class="flex items-center gap-4">
                <input id="q" type="text" placeholder="Search web & documents..." class="bg-transparent flex-1 outline-none text-lg px-2">
                <button onclick="run()" class="bg-blue-600 hover:bg-blue-500 transition p-3 rounded-full h-12 w-12 flex items-center justify-center"><i class="fas fa-arrow-up"></i></button>
            </div>
            <div class="flex gap-4 mt-3 border-t border-gray-900 pt-3">
                <div class="text-xs text-gray-500 flex items-center gap-2 cursor-pointer hover:text-blue-400"><i class="fas fa-brain"></i> Deep Thinking ON</div>
                <div class="text-xs text-gray-500 flex items-center gap-2 cursor-pointer hover:text-green-400"><i class="fas fa-globe"></i> Web Access</div>
            </div>
        </div>
    </div>

    <script>
        async function run() {
            const q = document.getElementById('q');
            const feed = document.getElementById('feed');
            if(!q.value) return;

            const userQ = q.value;
            feed.innerHTML += `<div class="text-4xl font-serif mt-10 text-white">${userQ}</div>`;
            const box = document.createElement('div');
            box.innerHTML = `<div class="thinking-box animate-pulse">DeepSeek-R1 is thinking...</div>`;
            feed.appendChild(box);
            q.value = "";

            try {
                const res = await fetch(`/research?query=${encodeURIComponent(userQ)}`);
                const data = await res.json();

                box.innerHTML = `
                    <div class="text-gray-300 leading-relaxed text-xl mb-6">${data.answer.replace(/\n/g, '<br>')}</div>
                    <div class="flex items-center gap-6 text-gray-600 border-t border-gray-900 pt-4">
                        <button onclick="copyText(this, '${data.answer}')" class="hover:text-blue-400 flex items-center gap-2"><i class="far fa-copy"></i> Copy</button>
                        <button onclick="shareLink()" class="hover:text-blue-400 flex items-center gap-2"><i class="fas fa-share-alt"></i> Share</button>
                        <div class="flex gap-4 ml-auto">
                            <i class="far fa-thumbs-up cursor-pointer hover:text-green-500"></i>
                            <i class="far fa-thumbs-down cursor-pointer hover:text-red-500"></i>
                        </div>
                    </div>
                `;
            } catch (e) {
                box.innerHTML = `<div class="text-red-500">Connection Error. Check backend logs.</div>`;
            }
        }

        function copyText(btn, text) {
            navigator.clipboard.writeText(text);
            btn.innerHTML = `<i class="fas fa-check"></i> Copied`;
            setTimeout(() => btn.innerHTML = `<i class="far fa-copy"></i> Copy`, 2000);
        }

        function shareLink() {
            const url = window.location.href;
            navigator.clipboard.writeText(url);
            alert("Shareable link copied to clipboard!");
        }

        async function upload() {
            const f = document.getElementById('fileUp').files[0];
            const d = new FormData(); d.append('file', f);
            const res = await fetch('/upload', {method:'POST', body:d});
            const j = await res.json();
            alert(j.message);
        }
    </script>
</body>
</html>
